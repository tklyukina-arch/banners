<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, initial-scale=1.0">
  <title>Дивный — HTML5 баннер 1200×200</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="click-area" aria-label="Дивный">
    <div class="banner">
      <div class="frame frame-1" aria-hidden="true">
        <img class="photo" src="images/dom.jpg" alt="">
        <img class="left-object" src="images/left.svg" alt="">
        <img class="logo" src="images/logo_divnii.svg" alt="Дивный">
      </div>

      <div class="frame frame-2" aria-hidden="true">
        <img class="green-object" src="images/green.svg" alt="">
        <div class="disclaimer">
          Реклама. Рекламодатель и застройщик ООО<br>
          СЗ «ИСБ-недвижимость», ИНН 9705130661.<br>
          Проектная декларация на сайте наш.дом.рф.
        </div>
        <img class="cursor-arrow" src="images/arrow.svg" alt="">
      </div>
    </div>
  </div>

  <script>
    var flashVars = {
      reference: "%request.reference%",
      link: "%banner.user1%",
      target: "%banner.target%",
      rnd: parseInt("%request.place_random%") || parseInt("%system.random%"),
      events: [
        "",
        "%banner.event1%",
        "%banner.event2%",
        "%banner.event3%",
        "%banner.event4%",
        "%banner.event5%",
        "%banner.event6%",
        "%banner.event7%",
        "%banner.event8%",
        "%banner.event9%",
        "%banner.event10%",
        "%banner.event11%",
        "%banner.event12%",
        "%banner.event13%",
        "%banner.event14%",
        "%banner.event15%",
        "%banner.event16%",
        "%banner.event17%",
        "%banner.event18%",
        "%banner.event19%",
        "%banner.event20%",
        "%banner.event21%",
        "%banner.event22%",
        "%banner.event23%",
        "%banner.event24%",
        "%banner.event25%",
        "%banner.event26%",
        "%banner.event27%",
        "%banner.event28%",
        "%banner.event29%",
        "%banner.event30%"
      ]
    };
  </script>
  <script type="text/javascript" src="https://banners.adfox.ru/files/adfox_HTML5.js"></script>
  <script src="script.js"></script>
</body>
</html>
