<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="ad.size" content="width=1340,height=700">
  <title>Парковые кварталы — HTML5 баннер</title>
  <link rel="stylesheet" href="style.css">

  <script>
    var flashVars = {
      reference: "%request.reference%",
      link: "%banner.user1%",
      target: "%banner.target%",
      rnd: parseInt("%request.place_random%") || parseInt("%system.random%"),
      events: [
        "",
        "%banner.event1%",
        "%banner.event2%",
        "%banner.event3%",
        "%banner.event4%",
        "%banner.event5%",
        "%banner.event6%",
        "%banner.event7%",
        "%banner.event8%",
        "%banner.event9%",
        "%banner.event10%",
        "%banner.event11%",
        "%banner.event12%",
        "%banner.event13%",
        "%banner.event14%",
        "%banner.event15%",
        "%banner.event16%",
        "%banner.event17%",
        "%banner.event18%",
        "%banner.event19%",
        "%banner.event20%",
        "%banner.event21%",
        "%banner.event22%",
        "%banner.event23%",
        "%banner.event24%",
        "%banner.event25%",
        "%banner.event26%",
        "%banner.event27%",
        "%banner.event28%",
        "%banner.event29%",
        "%banner.event30%"
      ]
    };
  </script>
  <script type="text/javascript" src="https://banners.adfox.ru/files/adfox_HTML5.js"></script>
</head>
<body>
  <div class="click-area" aria-label="Рекламный баннер Парковые кварталы">
    <div class="banner">
      <div class="background background-one" aria-hidden="true"></div>
      <div class="background background-two" aria-hidden="true"></div>

      <div class="content-frame">
        <div class="info-panel">
          <img class="logo" src="images/logo.svg" alt="Парковые кварталы">

          <div class="text-group">
            <h1 class="title">Парковые кварталы</h1>
            <p class="subtitle">Масштабный район со всей инфраструктурой</p>
          </div>
        </div>
      </div>

      <div class="disclaimer" aria-hidden="true"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
